<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Calcular Média</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>


    <form action="calcmedia.php" method="post">
            <h1>Calcular Média</h1>

        <input type="text" name="nome" placeholder="Nome" required>
        <input type="text" name="sobrenome" placeholder="Sobrenome" required>

        <input type="number" name="n1" placeholder="Nota 1" step="0.1" required>
        <input type="number" name="n2" placeholder="Nota 2" step="0.1" required>
        <input type="number" name="n3" placeholder="Nota 3" step="0.1" required>

        <input type="submit" value="Enviar">
    </form>

</body>
</html>
